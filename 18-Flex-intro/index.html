<!DOCTYPE html>
<html>
<head>
    <title>Freelancer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>Start Bootstrap</h2>
        <ul>
            <li>Portfolio</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </div>

    <!-- Header -->
    <div class="header">
        <h1>Start Bootstrap</h1>
        <p>Graphic Artist - Web Designer - Illustrator</p>
    </div>

    <!-- Portfolio -->
    <div class="section">
        <h2>Portfolio</h2>

        <div class="cards">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c" alt="Mercedes">
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" alt="Mercedes">
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1493238792000-8113da705763" alt="Mercedes">
            </div>
        </div>

    </div>

    <!-- About -->
    <div class="section about">
        <h2>About</h2>
        <p>Freelancer is a free bootstrap theme created by Start Bootstrap.</p>
    </div>

    <!-- Contact -->
    <div class="section">
        <h2>Contact Me</h2>
        <input type="text" placeholder="Full Name"><br>
        <input type="email" placeholder="Email Address"><br>
        <textarea placeholder="Message"></textarea><br>
        <button>Send</button>
    </div>

</body>
</html>
