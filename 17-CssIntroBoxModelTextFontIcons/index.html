<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="login-box">
        <span class="close">×</span>

        <h2>Login Form</h2>

        <label>Email or Phone</label>
        <input type="text">

        <label>Password</label>
        <input type="password">

        <a href="#" class="forgot">Forgot Password?</a>

        <button>LOGIN</button>

        <p>Not a member? <a href="#">Signup now</a></p>
    </div>
</div>

</body>
</html>
